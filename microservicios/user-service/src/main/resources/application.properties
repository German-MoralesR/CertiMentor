spring.application.name=user-service

# Puerto del servidor
server.port=8081

# Configuración de la Base de Datos MySQL (Docker)
spring.datasource.url=jdbc:mysql://localhost:3306/db_user_service?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Propiedades para JWT
jwt.secret=ClaveSecretaParaMentoriasG4QueEsMuyLargaYSeguraParaQueNadieLaAdivine
jwt.expiration=86400000

# Token para comunicación interna entre microservicios
internal.service.token=TokenSecretoInternoMentoriasG4
